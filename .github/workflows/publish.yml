name: publish

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Build package
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*

  publish-with-environment:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Download dist
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Publish to PyPI with environment
        continue-on-error: true
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true

  publish-without-environment:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Download dist
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Publish to PyPI without environment
        continue-on-error: true
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true

  verify:
    needs: [publish-with-environment, publish-without-environment]
    runs-on: ubuntu-latest

    steps:
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Verify package is available on PyPI
        run: |
          python -m pip install --upgrade pip
          for attempt in 1 2 3 4 5 6; do
            if python -m pip install --no-cache-dir "opencc-py-tw2==0.1.0"; then
              python - <<'PY'
          from opencc_py import converter
          assert converter("cn", "tw2").convert("汉语") == "漢語"
          PY
              exit 0
            fi
            sleep 10
          done
          exit 1
